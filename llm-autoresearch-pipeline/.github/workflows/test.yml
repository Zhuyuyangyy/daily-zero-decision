name: Python Tests
on:
  push:
    paths:
      - 'audit_v3/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements-dev.txt'
  pull_request:
    paths:
      - 'audit_v3/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements-dev.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v
